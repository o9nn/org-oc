    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-all-dev cmake guile-3.0-dev cxxtest
          echo "/usr/local/lib/opencog" | sudo tee /etc/ld.so.conf.d/opencog.conf
          sudo ldconfig
      - name: Download cogutil install
        uses: actions/download-artifact@v4
        with:
          name: cogutil-install
          path: /tmp/cogutil-install
      - name: Restore cogutil
        run: |
          if [ -d /tmp/cogutil-install ]; then
            sudo cp -r /tmp/cogutil-install/* /usr/local/ 2>/dev/null || true
            sudo ldconfig
          fi
      - name: Download atomspace install
        uses: actions/download-artifact@v4
        with:
          name: atomspace-install
          path: /tmp/atomspace-install
      - name: Restore atomspace
        run: |
          if [ -d /tmp/atomspace-install ]; then
            sudo cp -r /tmp/atomspace-install/* /usr/local/ 2>/dev/null || true
            sudo ldconfig
          fi
      - name: Download cogserver install
        uses: actions/download-artifact@v4
        with:
          name: cogserver-install
          path: /tmp/cogserver-install
      - name: Restore cogserver
        run: |
          if [ -d /tmp/cogserver-install ]; then
            sudo cp -r /tmp/cogserver-install/* /usr/local/ 2>/dev/null || true
            sudo ldconfig
          fi
      - name: Download ure install
        uses: actions/download-artifact@v4
        with:
          name: ure-install
          path: /tmp/ure-install
      - name: Restore ure
        run: |
          if [ -d /tmp/ure-install ]; then
            sudo cp -r /tmp/ure-install/* /usr/local/ 2>/dev/null || true
            sudo ldconfig
          fi
      - name: Download pln install
        uses: actions/download-artifact@v4
        with:
          name: pln-install
          path: /tmp/pln-install
      - name: Restore pln
        run: |
          if [ -d /tmp/pln-install ]; then
            sudo cp -r /tmp/pln-install/* /usr/local/ 2>/dev/null || true
            sudo ldconfig
          fi
      - name: Build python-attic
        run: |
          set -eo pipefail
          if [ -d "python-attic" ] && [ -f "python-attic/CMakeLists.txt" ]; then
            cd python-attic
            mkdir -p build && cd build
            cmake .. -DCMAKE_BUILD_TYPE=${{env.CMAKE_BUILD_TYPE}} 2>&1 | tee cmake.log
            make ${{env.MAKEFLAGS}} 2>&1 | tee make.log
            sudo make install 2>&1 | tee install.log
            sudo ldconfig
          else
            echo "SKIP: python-attic — no CMakeLists.txt"
          fi
      - name: Upload python-attic install
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: python_attic-install
          path: |
            /usr/local/include/opencog
            /usr/local/lib/opencog
            /usr/local/lib/cmake
            /usr/local/share/opencog
      - name: Upload python-attic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python_attic-logs
          path: |
            python-attic/build/cmake.log
            python-attic/build/make.log
            python-attic/build/install.log
