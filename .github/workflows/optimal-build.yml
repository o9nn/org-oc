    needs: [system_setup, cogutil, atomspace]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake cxxtest guile-3.0-dev libboost-all-dev libopencv-dev
          echo "/usr/local/lib/opencog" | sudo tee /etc/ld.so.conf.d/opencog.conf
          sudo ldconfig
      - uses: actions/download-artifact@v4
        with:
          name: cogutil-install
          path: /tmp/cogutil-install
      - name: Install cogutil
        run: |
          if [ -d /tmp/cogutil-install ]; then
            sudo cp -r /tmp/cogutil-install/* /usr/local/ 2>/dev/null || true
          fi
          sudo ldconfig
      - uses: actions/download-artifact@v4
        with:
          name: atomspace-install
          path: /tmp/atomspace-install
      - name: Install atomspace
        run: |
          if [ -d /tmp/atomspace-install ]; then
            sudo cp -r /tmp/atomspace-install/* /usr/local/ 2>/dev/null || true
          fi
          sudo ldconfig
      - name: Build vision
        run: |
          mkdir -p /tmp/vision-build && cd /tmp/vision-build
          cmake $GITHUB_WORKSPACE/vision -DCMAKE_INSTALL_PREFIX=$INSTALL_PREFIX -DCMAKE_BUILD_TYPE=$CMAKE_BUILD_TYPE 2>&1 | tee cmake.log
          make -j$(nproc) 2>&1 | tee make.log
          sudo make install 2>&1 | tee install.log
          sudo ldconfig
      - name: Package vision
        if: success()
        run: |
          mkdir -p /tmp/vision-pkg
          for d in include/opencog lib/opencog lib/cmake share/opencog share/guile; do
            [ -d /usr/local/$d ] && mkdir -p /tmp/vision-pkg/$d && cp -a /usr/local/$d/* /tmp/vision-pkg/$d/ 2>/dev/null || true
          done
          # Also grab opencog libs and link-grammar files
          for f in /usr/local/lib/libcog*.so* /usr/local/lib/libatomspace*.so* /usr/local/lib/libsmob*.so* /usr/local/lib/liblink-grammar*.so*; do
            [ -f "$f" ] && mkdir -p /tmp/vision-pkg/lib && cp -a "$f" /tmp/vision-pkg/lib/ 2>/dev/null || true
          done
          # Grab pkgconfig
          [ -d /usr/local/lib/pkgconfig ] && mkdir -p /tmp/vision-pkg/lib/pkgconfig && cp -a /usr/local/lib/pkgconfig/* /tmp/vision-pkg/lib/pkgconfig/ 2>/dev/null || true
          # Grab link-grammar headers
          [ -d /usr/local/include/link-grammar ] && mkdir -p /tmp/vision-pkg/include/link-grammar && cp -a /usr/local/include/link-grammar/* /tmp/vision-pkg/include/link-grammar/ 2>/dev/null || true
          du -sh /tmp/vision-pkg/ && find /tmp/vision-pkg -type f | wc -l
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: vision-install
          path: /tmp/vision-pkg
          retention-days: 1
          compression-level: 9
      - uses: actions/upload-artifact@v4
        if: always()
        with:
