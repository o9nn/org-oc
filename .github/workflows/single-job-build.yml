# single-job-build.yml — All package builds in a single GH Actions job
# Builds all 44 OpenCog packages sequentially in dependency tier order.
# Each package is a separate step; installed libraries persist across steps.
# Critical path: cogutil -> atomspace -> unify -> ure -> pln -> python-attic

name: OC Single-Job Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CMAKE_BUILD_TYPE: Release
  INSTALL_PREFIX: /usr/local

permissions:
  contents: read

jobs:
  build-all:
    name: Build All Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf autoconf-archive automake binutils-dev cmake cxxtest \
            cython3 flex guile-3.0-dev libboost-all-dev libiberty-dev \
            libgtk-3-dev liboctomap-dev libopencv-dev libopenmpi-dev \
            libpqxx-dev libprotobuf-dev librocksdb-dev libssl-dev libtool \
            pkg-config protobuf-compiler swig unixodbc-dev uuid-dev \
            nlohmann-json3-dev libgrpc++-dev protobuf-compiler-grpc \
            libopendht-dev libipfs-http-client-dev || true
          echo "/usr/local/lib/opencog" | sudo tee /etc/ld.so.conf.d/opencog.conf
          sudo ldconfig

      # =======================================================================
      # Tier 0 — no OpenCog dependencies
      # =======================================================================

      - name: 'T0: Build cogutil'
        continue-on-error: true
        run: |
          mkdir -p /tmp/cogutil-build && cd /tmp/cogutil-build
          cmake $GITHUB_WORKSPACE/cogutil \
            -DCMAKE_INSTALL_PREFIX=$INSTALL_PREFIX \
            -DCMAKE_BUILD_TYPE=$CMAKE_BUILD_TYPE 2>&1 | tee cmake.log
          make -j$(nproc) 2>&1 | tee make.log
          sudo make install 2>&1 | tee install.log
          sudo ldconfig

      - name: 'T0: Build link-grammar'
        continue-on-error: true
        run: |
          cd $GITHUB_WORKSPACE/link-grammar
          ./autogen.sh --no-configure 2>&1 | tee /tmp/link-grammar-autogen.log || true
          mkdir -p /tmp/link-grammar-build && cd /tmp/link-grammar-build
          $GITHUB_WORKSPACE/link-grammar/configure \
            --prefix=$INSTALL_PREFIX 2>&1 | tee configure.log
          make -j$(nproc) 2>&1 | tee make.log
          sudo make install 2>&1 | tee install.log
          sudo ldconfig

      # =======================================================================
      # Tier 1 — depends on cogutil (and/or no OpenCog deps)
      # =======================================================================

      - name: 'T1: Build atomspace'
        continue-on-error: true
        run: |
          mkdir -p /tmp/atomspace-build && cd /tmp/atomspace-build
          cmake $GITHUB_WORKSPACE/atomspace \
            -DCMAKE_INSTALL_PREFIX=$INSTALL_PREFIX \
            -DCMAKE_BUILD_TYPE=$CMAKE_BUILD_TYPE 2>&1 | tee cmake.log
          make -j$(nproc) 2>&1 | tee make.log
          sudo make install 2>&1 | tee install.log
          sudo ldconfig

