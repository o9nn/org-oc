apiVersion: apps/v1
kind: Deployment
metadata:
  name: integration-hub
  labels:
    app: cognitive-cities
    component: integration-hub
spec:
  replicas: 2
  selector:
    matchLabels:
      component: integration-hub
  template:
    metadata:
      labels:
        app: cognitive-cities
        component: integration-hub
    spec:
      containers:
      - name: api-gateway
        image: cognitive-cities/api-gateway:latest
        ports:
        - containerPort: 5000
        env:
        - name: FLASK_ENV
          value: "production"
        - name: API_HOST
          value: "0.0.0.0"
        - name: API_PORT
          value: "5000"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          
      - name: event-bus
        image: cognitive-cities/event-bus:latest
        ports:
        - containerPort: 6000
        env:
        - name: EVENT_BUS_PORT
          value: "6000"
        - name: MAX_HISTORY_SIZE
          value: "1000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 6000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 6000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: integration-hub-service
  labels:
    app: cognitive-cities
    component: integration-hub
spec:
  selector:
    component: integration-hub
  ports:
  - name: api-gateway
    protocol: TCP
    port: 80
    targetPort: 5000
  - name: event-bus
    protocol: TCP
    port: 6000
    targetPort: 6000
  type: LoadBalancer

---
apiVersion: v1
kind: Service
metadata:
  name: cognitive-cities-api
  labels:
    app: cognitive-cities
    component: public-api
spec:
  selector:
    component: integration-hub
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 5000
  type: LoadBalancer