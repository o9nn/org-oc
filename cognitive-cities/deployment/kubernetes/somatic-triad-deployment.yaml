apiVersion: apps/v1
kind: Deployment
metadata:
  name: somatic-triad
  labels:
    app: cognitive-cities
    triad: somatic
spec:
  replicas: 2
  selector:
    matchLabels:
      triad: somatic
  template:
    metadata:
      labels:
        app: cognitive-cities
        triad: somatic
    spec:
      containers:
      - name: motor-control-service
        image: cognitive-cities/motor-control-service:latest
        ports:
        - containerPort: 8011
        env:
        - name: COORDINATION_TYPE
          value: "movement"
        - name: EVA_INTEGRATION
          value: "true"
        - name: TRIAD
          value: "somatic"
        resources:
          requests:
            memory: "384Mi"
            cpu: "500m"
          limits:
            memory: "768Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8011
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8011
          initialDelaySeconds: 5
          periodSeconds: 5
          
      - name: sensory-service
        image: cognitive-cities/sensory-service:latest
        ports:
        - containerPort: 8012
        env:
        - name: VISION_ENABLED
          value: "true"
        - name: AUDIO_ENABLED
          value: "true"
        - name: TRIAD
          value: "somatic"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8012
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8012
          initialDelaySeconds: 5
          periodSeconds: 5
          
      - name: somatic-processing-service
        image: cognitive-cities/somatic-processing-service:latest
        ports:
        - containerPort: 8013
        env:
        - name: PROCESSING_TYPE
          value: "behavioral"
        - name: TRIAD
          value: "somatic"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8013
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8013
          initialDelaySeconds: 5
          periodSeconds: 5
          
      - name: somatic-output-service
        image: cognitive-cities/somatic-output-service:latest
        ports:
        - containerPort: 8014
        env:
        - name: OUTPUT_TYPE
          value: "behavioral_response"
        - name: TRIAD
          value: "somatic"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8014
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8014
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: somatic-triad-service
  labels:
    app: cognitive-cities
    triad: somatic
spec:
  selector:
    triad: somatic
  ports:
  - name: motor-control
    protocol: TCP
    port: 8011
    targetPort: 8011
  - name: sensory-service
    protocol: TCP
    port: 8012
    targetPort: 8012
  - name: processing-service
    protocol: TCP
    port: 8013
    targetPort: 8013
  - name: output-service
    protocol: TCP
    port: 8014
    targetPort: 8014
  type: ClusterIP